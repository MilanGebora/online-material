<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONLINE MATERIÁL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

/* ===== HLAVIČKA ===== */

header{
    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("IMG_9838.jpeg");
    background-size:cover;
    background-position:center;
    text-align:center;
    padding:80px 20px 70px 20px;
}

header h1{
    margin:0;
    font-family:'Playfair Display', serif;
    font-size:44px;
    letter-spacing:2px;
    color:white;
}

header p{
    margin-top:18px;
    font-size:18px;
    color:#f0f0f0;
}

/* ===== ORANŽOVÁ LIŠTA ===== */

nav{
    background: linear-gradient(145deg,#ff7a00,#e85c00);
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

nav ul{
    margin:0;
    padding:0;
    list-style:none;
    display:flex;
    justify-content:center;
    align-items:center;
}

nav li{
    position:relative;
}

nav a{
    display:block;
    padding:22px 45px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    font-size:22px;
    letter-spacing:0.5px;
}

/* vertikálne čiary */

nav li:not(:last-child)::after{
    content:"";
    position:absolute;
    right:0;
    top:50%;
    transform:translateY(-50%);
    height:30px;
    width:2px;
    background:white;
    opacity:0.8;
}

/* hover */

nav a:hover{
    background:rgba(255,255,255,0.15);
}

/* ===== MOBIL – stále vodorovne ===== */

@media (max-width:768px){

    header{
        padding:60px 15px;
    }

    header h1{
        font-size:34px;
    }

    nav a{
        padding:18px 25px;
        font-size:18px;
    }
}

</style>
</head>

<body>

<header>
    <h1>ONLINE MATERIÁL</h1>
    <p>… pre Vašu stavbu, najlacnejšie a s dovozom</p>
</header>

<nav>
    <ul>
        <li><a href="#">Materiál</a></li>
        <li><a href="#">Online poradenstvo</a></li>
        <li><a href="#">Kontakt</a></li>
    </ul>
</nav>

</body>
</html>
