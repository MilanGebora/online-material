<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONLINE MATERIÁL</title>

<!-- Elegantný serif font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* ===== HLAVIČKA ===== */

header {
    background-image: 
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        url("IMG_9838.jpeg");
    background-size: cover;
    background-position: center;
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    letter-spacing: 2px;
    color: #111;
}

header p {
    margin-top: 15px;
    font-size: 18px;
    color: #333;
}

/* ===== ORANŽOVÁ LIŠTA ===== */

nav {
    background: linear-gradient(145deg, #ff7a00, #e85c00);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
}

nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
}

nav li {
    display: flex;
    align-items: center;
}

nav a {
    display: block;
    padding: 22px 40px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 20px;
}

nav li:not(:last-child)::after {
    content: "";
    width: 2px;
    height: 28px;
    background: white;
    opacity: 0.7;
}

nav a:hover {
    background: rgba(255,255,255,0.15);
}

/* ===== RESPONSIVE (MOBIL) ===== */

@media (max-width: 768px) {

    header {
        padding: 45px 15px;
    }

    header h1 {
        font-size: 32px;
    }

    nav ul {
        flex-direction: column;
        width: 100%;
    }

    nav li:not(:last-child)::after {
        display: none;
    }

    nav a {
        text-align: center;
        border-top: 1px solid rgba(255,255,255,0.3);
    }
}

</style>
</head>

<body>

<header>
    <h1>ONLINE MATERIÁL</h1>
    <p>… pre Vašu stavbu, najlacnejšie a s dovozom</p>
</header>

<nav>
    <ul>
        <li><a href="#">Materiál</a></li>
        <li><a href="#">Online poradenstvo</a></li>
        <li><a href="#">Kontakt</a></li>
    </ul>
</nav>

</body>
</html>
