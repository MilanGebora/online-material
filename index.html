<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONLINE STAVBA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* HLAVIČKA */
header {
    background: #111;
    color: white;
    text-align: center;
    padding: 40px 20px;
}

/* MENU */
nav {
    background: #ff6a00;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO SEKCIa — MEGA */
.hero {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1503387762-592deb58ef4e");
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 32px;
}

.hero button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 8px;
    margin-top: 20px;
}

/* PRODUKTY */
.section {
    padding: 40px 20px;
    text-align: center;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.product {
    background: white;
    width: 280px;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    margin-top: 10px;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>ONLINE STAVBA</h1>
    <p>Všetko pre vašu stavbu</p>
</header>

<nav>
    <a href="#">Domov</a>
    <a href="#">Produkty</a>
    <a href="#">O nás</a>
    <a href="#">Kontakt</a>
</nav>

<section class="hero">
    <h2>Stavebný materiál za najlepšie ceny</h2>
    <p>Dovoz priamo na stavbu</p>
    <button>OBJEDNAŤ TERAZ</button>
</section>

<section class="section">
    <h2>Naše produkty</h2>

    <div class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1581090700227-1e8a0c6d7f9c">
            <h3>Tehly</h3>
            <p>Kvalitné tehly pre každú stavbu</p>
            <button>Kúpiť</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1590856029826-c7a73142bbf1">
            <h3>Cement</h3>
            <p>Silný a spoľahlivý cement</p>
            <button>Kúpiť</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
            <h3>Izolácia</h3>
            <p>Najlepšia ochrana pred chladom</p>
            <button>Kúpiť</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 ONLINE STAVBA</p>
</footer>

</body>
</html>
