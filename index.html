<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONLINE MATERIÁL</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f4f4f4;
}

/* ===== HLAVIČKA ===== */
header {
    position: relative;
    background: linear-gradient(135deg, #111 0%, #1c1c1c 40%, #111 100%);
    color: white;
    text-align: center;
    padding: 110px 20px 90px 20px;
    overflow: hidden;
}

/* jemný svetelný efekt */
header::after {
    content: "";
    position: absolute;
    bottom: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,106,0,0.25) 0%, rgba(0,0,0,0) 70%);
}

/* obsah hlavičky */
.header-content {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
    animation: fadeIn 1.2s ease forwards;
}

/* NADPIS */
header h1 {
    margin: 0;
    font-size: 50px;
    font-family: 'Cinzel', serif;
    letter-spacing: 4px;
    white-space: nowrap;
}

/* PODNADPIS */
header p {
    margin: 18px 0 0 0;
    font-size: 18px;
    color: #ddd;
}

/* jemná animácia */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== ORANŽOVÁ LIŠTA ===== */
nav {
    background: #ff6a00;
    display: flex;
    justify-content: center;
    align-items: center;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    padding: 20px 35px;
    white-space: nowrap;
    transition: background 0.3s ease;
}

nav a:hover {
    background: rgba(255,255,255,0.15);
}

/* biele vertikálne čiary */
nav a:not(:last-child) {
    border-right: 2px solid white;
}

/* ===== PRÁZDNY PRIESTOR POD MENU ===== */
main {
    height: 500px;
    background: #f4f4f4;
}
</style>
</head>

<body>

<header>
    <div class="header-content">
        <h1>ONLINE MATERIÁL</h1>
        <p>… pre Vašu stavbu, najlacnejšie a s dovozom</p>
    </div>
</header>

<nav>
    <a href="#">Materiál</a>
    <a href="#">Online poradenstvo</a>
    <a href="#">Kontakt</a>
</nav>

<main>
</main>

</body>
</html>
